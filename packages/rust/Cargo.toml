[package]
name = "liteparse-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.5.55", features = ["derive"] }
pdfium-render = { version = "0.8.37", features = ["static", "libc++", "core_graphics"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"

[env]                                                                                                                      
PDFIUM_STATIC_LIB_PATH = { value = "vendor/pdfium/release/lib", relative = true } 
